<!DOCTYPE html>
<html lang="und">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="meta-title">CV</title>
<meta id="meta-description" name="description" content="CV profile">
<meta id="meta-author"      name="author"      content="">
<meta id="meta-keywords"    name="keywords"    content="">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/cv.css">
</head>
<body>
<div id="shell">
<div id="page" itemscope itemtype="https://schema.org/Person">

  <!-- ══════════════════════════════════
       HEADER
  ══════════════════════════════════ -->
  <header id="hdr">
    <div id="photo"><img id="photo-img" alt="Profile photo"></div>

    <div>
      <h1 class="hname" id="person-name" itemprop="name"></h1>
      <p  class="htitle" id="person-title" itemprop="jobTitle"></p>
      <address class="hcontact">
        <span class="ci"><span class="ci-ic">☎</span><a id="person-phone" href=""></a></span>
        <span class="ci"><span class="ci-ic">✉</span><a id="person-email" href=""></a></span>
        <span class="ci"><span class="ci-ic" style="font-family:var(--fh);font-weight:700">in</span><a id="person-linkedin" href="" target="_blank"></a></span>
      </address>
    </div>

    <div class="hstatus">
      <div class="bavail"><span class="bavail-dot"></span><span id="ui-available">AVAILABLE</span></div>
      <div class="bloc" id="person-location"></div>
      <div id="locale-switch" class="locale-switch" hidden>
        <label id="ui-lang-label" for="locale-select">Language</label>
        <select id="locale-select" aria-label="Language selector"></select>
      </div>
    </div>

    <div class="corner-bl"></div>
    <div class="scan"></div>
  </header>

  <!-- ══════════════════════════════════
       SUMMARY
  ══════════════════════════════════ -->
  <section id="summary" itemprop="description">
    <div class="sec-tag" id="ui-tag-profile">// profile</div>
    <p class="summary-text">
      <span id="person-summary"></span>
      <span class="summary-impact" id="person-summary-impact"></span>
    </p>
  </section>

  <!-- ══════════════════════════════════
       MAIN COLUMNS
  ══════════════════════════════════ -->
  <div id="main">

    <!-- ── TIMELINE ──────────────────── -->
    <section id="col-timeline" aria-label="Career & Education">
      <div class="sec-tag" id="ui-tag-career">// career &amp; education</div>

      <div class="timeline" id="timeline-list">
        <span class="tl-arrow tl-arrow-now" aria-hidden="true"></span>
        <span class="tl-arrow tl-arrow-past" aria-hidden="true"></span>
        <span class="tl-axis-label tl-axis-now" id="ui-tl-now">NOW</span>
        <span class="tl-axis-label tl-axis-past" id="ui-tl-past">PAST</span>
      </div><!-- .timeline -->
    </section>

    <!-- ── SKILLS ─────────────────────── -->
    <section id="col-skills" aria-label="Key Stack Used in Production">
      <div class="sec-tag" id="ui-tag-stack">// key stack used in production</div>

      <!-- Radar SVG (pure SVG, no canvas, prints perfectly) -->
      <div id="radar-wrap">
        <svg id="radar-svg" viewBox="-10 -10 240 240" xmlns="http://www.w3.org/2000/svg"
             aria-hidden="true" role="img" style="overflow:visible">
          <!-- generated by JS below -->
        </svg>
        <span class="stack-note" id="ui-stack-note">Representative technologies delivered in production</span>
      </div>

      <!-- Skill bars -->
      <div id="skill-bars"></div><!-- #skill-bars -->
    </section>

  </div><!-- #main -->

  <!-- ══════════════════════════════════
       FOOTER
  ══════════════════════════════════ -->
  <footer id="footer">
    <span id="footer-person"></span>
    <span class="footer-name" id="footer-updated"></span>
  </footer>

</div><!-- #page -->
</div><!-- #shell -->

<!-- ═══════════════════════════════════════════════════════════
     PAGE 2 — FORMAL CV
     Forced to second A4 sheet in print via page-break-before
════════════════════════════════════════════════════════════ -->
<div id="shell-formal">
<div id="page-formal">

  <!-- Formal header -->
  <header id="fhdr">
    <div>
      <div class="fname" id="fperson-name"></div>
      <div class="ftitle" id="fperson-title"></div>
    </div>
    <address id="fhdr-contact"></address>
  </header>

  <!-- Work Experience -->
  <section class="fsection">
    <h2 class="fsec-title" id="ftitle-work">Work Experience</h2>
    <div id="fwork-list"></div>
  </section>

  <!-- Education -->
  <section class="fsection">
    <h2 class="fsec-title" id="ftitle-edu">Education</h2>
    <div id="fedu-list"></div>
  </section>

  <!-- Languages + Certifications side by side -->
  <div class="ftwo-col">
    <section class="fsection">
      <h2 class="fsec-title" id="ftitle-lang">Languages</h2>
      <div id="flang-list"></div>
    </section>
    <section class="fsection">
      <h2 class="fsec-title" id="ftitle-cert">Certifications</h2>
      <div id="fcert-list"></div>
    </section>
  </div>

  <!-- Technical Skills -->
  <section class="fsection">
    <h2 class="fsec-title" id="ftitle-skills">Technical Skills</h2>
    <div id="fskills-list"></div>
  </section>

  <footer id="footer-formal">
    <span id="footer-formal-person"></span>
    <span class="footer-name" id="footer-formal-updated"></span>
  </footer>

</div><!-- #page-formal -->
</div><!-- #shell-formal -->

<button id="btn-theme" onclick="toggleTheme()">☀ Light Mode</button>
<button id="btn-print" onclick="window.print()">⎙ Export PDF</button>

<!-- ══════════════════════════════════════════════════════════
     RADAR SVG GENERATOR
     Pure SVG injected into #radar-svg — prints perfectly,
     no canvas, no fetch, no server needed.
════════════════════════════════════════════════════════════ -->
<script src="assets/js/cv.js"></script>

</body>
</html>
