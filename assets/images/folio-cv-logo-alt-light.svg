<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">folio-cv logo light</title>
  <desc id="desc">Minimal document icon and folio-cv wordmark for light backgrounds</desc>

  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5a5"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5a5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect x="22" y="24" width="106" height="136" rx="14" fill="url(#docGrad)" stroke="url(#accent)" stroke-width="3"/>
  <path d="M98 24 L128 54 L98 54 Z" fill="url(#accent)" opacity="0.55"/>
  <path d="M98 24 L128 54 L98 54 Z" fill="none" stroke="url(#accent)" stroke-width="1.6"/>

  <rect x="38" y="64" width="58" height="6" rx="3" fill="url(#accent)" opacity="0.7"/>
  <rect x="38" y="78" width="46" height="4" rx="2" fill="url(#accent)" opacity="0.42"/>
  <rect x="38" y="89" width="52" height="4" rx="2" fill="url(#accent)" opacity="0.42"/>
  <rect x="38" y="100" width="38" height="4" rx="2" fill="url(#accent)" opacity="0.42"/>

  <rect x="38" y="118" width="52" height="22" rx="11" fill="url(#accent)" opacity="0.92"/>
  <text x="64" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#042f2e">CV</text>

  <text x="160" y="121" font-family="Syne, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="-1.2" fill="#0f172a">folio-cv</text>
  <text x="162" y="152" font-family="Space Mono, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="1.2" fill="#0f766e">clean JSON resume engine</text>
