<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">folio-cv logo dark</title>
  <desc id="desc">Minimal document icon and folio-cv wordmark for dark backgrounds</desc>

  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="22" y="24" width="106" height="136" rx="14" fill="url(#docGrad)" stroke="url(#accent)" stroke-width="3"/>
  <path d="M98 24 L128 54 L98 54 Z" fill="url(#accent)" opacity="0.6"/>
  <path d="M98 24 L128 54 L98 54 Z" fill="none" stroke="url(#accent)" stroke-width="1.6"/>

  <rect x="38" y="64" width="58" height="6" rx="3" fill="url(#accent)" opacity="0.75"/>
  <rect x="38" y="78" width="46" height="4" rx="2" fill="url(#accent)" opacity="0.48"/>
  <rect x="38" y="89" width="52" height="4" rx="2" fill="url(#accent)" opacity="0.48"/>
  <rect x="38" y="100" width="38" height="4" rx="2" fill="url(#accent)" opacity="0.48"/>

  <rect x="38" y="118" width="52" height="22" rx="11" fill="url(#accent)" opacity="0.95"/>
  <text x="64" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#083344">CV</text>

  <text x="160" y="121" font-family="Syne, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="-1.2" fill="#e2e8f0">folio-cv</text>
  <text x="162" y="152" font-family="Space Mono, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="1.2" fill="#99f6e4">clean JSON resume engine</text>
